name: KMP Shared Scaffold CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  shared-core-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate shared core scaffold files
        run: |
          test -f kmp-shared/settings.gradle.kts
          test -f kmp-shared/build.gradle.kts
          test -f kmp-shared/shared/build.gradle.kts
          test -f kmp-shared/shared/src/commonMain/kotlin/com/shiro/aetherquest/shared/SharedGameCore.kt
